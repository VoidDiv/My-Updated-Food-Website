<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pre-Order | Saludo's Letchonhouse</title>
    <link rel="icon" type="image/png" href="Pictures/SaludoLetchonhouse.jpg">
    <link rel="stylesheet" href="Stylesheets/SaludoWebsite.css">

    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: rgb(235, 224, 206);
            background-image: url('Pictures/Yellow and Black Restaurant Food Menu.png');
            background-repeat: no-repeat;
            background-size: cover;
            color: #333;
            padding: 20px;
        }

        * {
            box-sizing: border-box;
        }

        .logo-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .left-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            border-radius: 50%;
            border: 2px solid black;
        }

        .title {
            background-color: rgb(100, 104, 83);
            color: rgb(240, 229, 216);
            font-size: 32px;
            padding: 5px 12px;
            border-radius: 6px;
            margin: 0;
        }

        .home-btn {
            padding: 10px 18px;
            background-color: rgb(86, 62, 75);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .home-btn:hover {
            background-color: rgb(65, 45, 55);
        }

        hr {
            border: none;
            height: 4px;
            background-color: black;
            margin: 20px 0;
        }

        .preorder-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.94);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        }

        .preorder-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(86, 62, 75);
            font-size: 30px;
        }

        #foodImage {
            display: block;
            margin: 0 auto 20px;
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgb(86, 62, 75);
            background: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 17px;
            color: rgb(60, 40, 45);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #888;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Times New Roman', serif;
            background-color: white;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .submit-btn,
        .back-btn {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn {
            background-color: rgb(86, 62, 75);
            color: white;
        }

        .submit-btn:hover {
            background-color: rgb(65, 45, 55);
        }

        .back-btn {
            background-color: rgb(120, 120, 120);
            color: white;
        }

        .back-btn:hover {
            background-color: rgb(90, 90, 90);
        }

        @media (max-width: 700px) {
            .two-columns {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 24px;
            }

            .logo {
                height: 90px;
            }

            .preorder-container {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <header class="logo-title">
        <div class="left-header">
            <img class="logo" src="Pictures/SaludoLetchonhouse.jpg" alt="Logo" height="150">
            <h1 class="title">SALUDO'S LETCHONHOUSE (SLS)</h1>
        </div>

        <button class="home-btn" onclick="window.location.href='SaludoStreetFoods.html'">Home</button>
    </header>

    <hr>

    <div class="preorder-container">
        <h2>PRE-ORDER FORM</h2>

        <img id="foodImage" alt="Food Image">

        <div class="form-group">
            <label>Food Item</label>
            <input type="text" id="foodItem" readonly>
        </div>

        <div class="two-columns">
            <div class="form-group">
                <label>Price</label>
                <input type="text" id="price" readonly>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" value="1" min="1">
            </div>
        </div>

        <div class="form-group">
            <label>Total</label>
            <input type="text" id="total" readonly>
        </div>

        <hr>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullname">
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" id="contact">
        </div>

        <div class="two-columns">
            <div class="form-group">
                <label>Pre-order Date</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label>Pre-order Time</label>
                <input type="time" id="time">
            </div>
        </div>

        <div class="form-group">
            <label>Order Type</label>
            <select id="orderType">
                <option value="">-- Select --</option>
                <option value="Pickup">Pickup</option>
                <option value="Delivery">Delivery</option>
            </select>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address">
        </div>

        <div class="form-group">
            <label>Payment Method</label>
            <select id="payment">
                <option value="">-- Select Payment --</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="GCash">GCash</option>
                <option value="Maya">Maya</option>
            </select>
        </div>

        <div class="form-group">
            <label>Instructions</label>
            <textarea id="instructions"></textarea>
        </div>

        <div class="button-row">
            <button class="submit-btn" onclick="submitPreOrder()">Submit Pre-Order</button>
            <button class="back-btn" onclick="window.location.href='SaludoStreetFoods.html'">Back</button>
        </div>
    </div>

    <script>
        let selectedItem = null;

        window.addEventListener("DOMContentLoaded", function() {
            const savedItem = localStorage.getItem("selectedPreOrderItem");

            if (!savedItem) {
                alert("No item selected!");
                window.location.href = "SaludoStreetFoods.html";
                return;
            }

            try {
                selectedItem = JSON.parse(savedItem);
            } catch (error) {
                alert("Invalid selected item data.");
                window.location.href = "SaludoStreetFoods.html";
                return;
            }

            document.getElementById("foodItem").value = selectedItem.name || "";
            document.getElementById("price").value = selectedItem.price || 0;
            document.getElementById("foodImage").src = selectedItem.image || "";

            updateTotal();

            document.getElementById("quantity").addEventListener("input", updateTotal);

            const today = new Date().toISOString().split("T")[0];
            document.getElementById("date").setAttribute("min", today);
        });

        function updateTotal() {
            const qty = parseInt(document.getElementById("quantity").value) || 1;
            const price = parseFloat(selectedItem.price) || 0;
            const total = qty * price;
            document.getElementById("total").value = total.toFixed(2);
        }

        function submitPreOrder() {
            const username = localStorage.getItem("loggedInUser");

            if (!username) {
                alert("Login first!");
                window.location.href = "SLSLogin.html";
                return;
            }

            const date = document.getElementById("date").value;
            const today = new Date();
            const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const selectedDate = new Date(date);

            if (selectedDate < todayOnly) {
                alert("Please select today or a future date!");
                return;
            }

            const data = {
                username: username,
                fullname: document.getElementById("fullname").value.trim(),
                contact: document.getElementById("contact").value.trim(),
                foodItem: document.getElementById("foodItem").value.trim(),
                price: parseFloat(document.getElementById("price").value) || 0,
                quantity: parseInt(document.getElementById("quantity").value) || 1,
                total: parseFloat(document.getElementById("total").value) || 0,
                date: date,
                time: document.getElementById("time").value,
                orderType: document.getElementById("orderType").value,
                address: document.getElementById("address").value.trim(),
                payment: document.getElementById("payment").value,
                instructions: document.getElementById("instructions").value.trim(),
                status: "Pending"
            };

            if (!data.fullname || !data.contact || !data.date || !data.time || !data.orderType || !data.address || !data.payment) {
                alert("Please fill all required fields!");
                return;
            }

            fetch("http://127.0.0.1:5000/preorder", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message || "Pre-order submitted successfully!");
                window.location.href = "viewOrders.html";
            })
            .catch(err => {
                console.error(err);
                alert("Failed to submit pre-order.");
            });
        }
    </script>

</body>
</html>
