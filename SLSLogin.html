<!DOCTYPE html>
<html>
<head>
    <title>SLSLogin</title>
    <link rel="icon" type="image/png" href="Pictures/SaludoLetchonhouse.jpg">
    <link rel="stylesheet" href="Stylesheets/SLSLogin.css">
    <style>
        body {
            background-color: rgb(222, 222, 222);
            background-image: url('Pictures/Yellow and Black Restaurant Food Menu.png');
        }
    </style>
</head>
<body>
    <header>
        <div>
            <img class="logo" src="Pictures/SSP.png" height="200px" width="200px">
            <h1 class="title">
                Saludo's Letchonhouse (SLS)
            </h1>
        </div>
    </header>

    <hr class="line">

    <div class="content-container">
        <p class="title1">SIGN IN</p>
        <p class="title2">TO ORDER PLEASE SIGN IN.</p>

        <input type="text" class="username" placeholder="Username">
       <div class="password-container">
    <input type="password" class="password" placeholder="Password" id="passwordField">
    <span class="toggle-password" id="togglePassword">👁</span>
      </div>

        <button class="login-button">Log In</button>

        <p class="question">Don't have account yet?</p>
        <a class="signup-link" href="SLSSignup.html">
            <p class="sign-up">SIGN UP HERE</p>
        </a>
    </div>

    <a class="home-link" href="#" id="backHomeLink">
        <p class="Home">BACK TO HOME</p>
    </a>

    <script>
    function clearSession() {
        localStorage.removeItem("adminLoggedIn");
        localStorage.removeItem("adminUsername");
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("latestUsername");
        localStorage.removeItem("selectedOrderItem");
        localStorage.removeItem("selectedPreOrderItem");
        localStorage.removeItem("cartItems");
    }

    document.getElementById("backHomeLink").addEventListener("click", function(e) {
        e.preventDefault();
        clearSession();
        window.location.href = "SaludoStreetFoods.html";
    });

    document.querySelector(".login-button").addEventListener("click", function() {
        const username = document.querySelector(".username").value.trim();
        const password = document.querySelector(".password").value.trim();

        if (!username || !password) {
            alert("Please enter both username and password.");
            return;
        }

        fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
        })
        .then(async (res) => {
            const data = await res.json();

            if (!res.ok) {
                alert(data.message);
                return;
            }

            clearSession();

            if (data.role === "admin") {
                localStorage.setItem("adminLoggedIn", "true");
                localStorage.setItem("adminUsername", data.username);
                localStorage.setItem("loggedInUser", data.username);
                localStorage.setItem("latestUsername", data.username);
                window.location.href = "admin-dashboard.html";
            } 
            else if (data.role === "user") {
                localStorage.setItem("loggedInUser", data.username);
                localStorage.setItem("latestUsername", data.username);
                window.location.href = "SaludoStreetFoods.html";
            } 
            else {
                alert(data.message);
            }
        })
        .catch(error => {
            console.error("Login error:", error);
            alert("Something went wrong. Make sure Flask is running.");
        });
    });
    </script>
</body>
</html>
